name: Stasisly CI

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - dev

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Install Dependencies
        run: flutter pub get
        
      - name: Analyze Code
        run: flutter analyze
        
      # TODO: Uncomment when tests are written
      # - name: Run Tests
      #   run: flutter test --coverage
