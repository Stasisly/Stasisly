name: Stasisly CI

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - dev

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Install Dependencies
        run: flutter pub get

      - name: Generate Code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze Code
        # Existing informational lint debt is tracked separately; warnings and
        # errors remain blocking.
        run: flutter analyze --no-fatal-infos

      - name: Run Tests
        run: flutter test
